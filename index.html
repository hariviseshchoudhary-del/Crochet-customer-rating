<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rate My Crochet</title>

<style>

body{
margin:0;
font-family:Poppins, sans-serif;
background:linear-gradient(135deg,#ffd6e8,#fff4cc,#d6f6ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:white;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,0.2);
width:300px;
z-index:2;
}

h2{
margin-top:0;
}

.stars{
font-size:42px;
}

.star{
cursor:pointer;
color:#ddd;
transition:0.2s;
}

.star:hover{
transform:scale(1.3);
}

.active{
color:#FFD93D;
}

.flower{
font-size:60px;
display:none;
margin-top:15px;
animation:pop 0.5s ease;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

.hearts{
position:absolute;
font-size:20px;
animation:float 3s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

</style>
</head>

<body>

<div class="card">

<h2>🌼 Rate my crochet</h2>
<p>Tap a star ⭐</p>

<div class="stars">

<span class="star" onclick="rate(1)">★</span>
<span class="star" onclick="rate(2)">★</span>
<span class="star" onclick="rate(3)">★</span>
<span class="star" onclick="rate(4)">★</span>
<span class="star" onclick="rate(5)">★</span>

</div>

<div class="flower" id="flower">
🌻🧶🌸  
<br>
Thank you for supporting handmade!
</div>

</div>

<script>

var scriptURL="https://script.google.com/macros/s/AKfycby9hG1EugHHmDTIGKIhG-tnDzESXStK0f3MrbxTt5yrOoZyNRMPr0alRkhlCiybm6I/exec"

function rate(n){

let stars=document.querySelectorAll(".star");

stars.forEach((s,i)=>{
if(i<n){
s.classList.add("active");
}
})

fetch(scriptURL+"?rating="+n);

if(n==5){
document.getElementById("flower").style.display="block";
launchHearts();
}

}

function launchHearts(){

for(let i=0;i<20;i++){

let heart=document.createElement("div");
heart.innerHTML="💖";
heart.className="hearts";

heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},3000);

}

}

</script>

</body>
</html>
